<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CHB Health Sciences — Interactive curriculum for grades 4–8. Learn human biology through hands-on simulations.">
  <title>Curriculum — Community Health Bridge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="curriculum.css">
</head>
<body class="curriculum-page">
  <div id="navbar-placeholder"></div>

  <!-- ======== HERO ======== -->
  <section class="curr-hero">
    <div class="curr-hero-bg"></div>
    <div class="container curr-hero-inner">
      <div class="curr-hero-badge">Interactive Learning Path</div>
      <h1 class="curr-hero-title">Health Sciences<br><em class="curr-hero-em">Curriculum</em></h1>
      <p class="curr-hero-sub">Three tiers · Nine modules · Real simulations.<br>Every concept is <strong>earned through interaction</strong>, then labeled with vocabulary.</p>
      <div class="curr-hero-stats">
        <div class="curr-stat"><span class="curr-stat-num">9</span><span class="curr-stat-label">Modules</span></div>
        <div class="curr-stat-div"></div>
        <div class="curr-stat"><span class="curr-stat-num">45+</span><span class="curr-stat-label">Lessons</span></div>
        <div class="curr-stat-div"></div>
        <div class="curr-stat"><span class="curr-stat-num">K–8</span><span class="curr-stat-label">Grade Range</span></div>
      </div>
    </div>
  </section>

  <!-- ======== XP BAR ======== -->
  <div class="curr-xp-bar" id="xp-bar">
    <div class="container curr-xp-inner">
      <div class="curr-xp-left">
        <span class="curr-xp-icon">⚡</span>
        <span class="curr-xp-label">XP: <strong id="xp-count">0</strong></span>
      </div>
      <div class="curr-xp-mid">
        <div class="curr-progress-track">
          <div class="curr-progress-fill" id="overall-progress-fill" style="width:0%"></div>
        </div>
        <span class="curr-xp-pct" id="overall-progress-pct">0% complete</span>
      </div>
      <div class="curr-xp-right">
        <button class="curr-reset-btn" id="reset-progress-btn" title="Reset progress">↺ Reset</button>
      </div>
    </div>
  </div>

  <!-- ======== LEARNING PATH ======== -->
  <main class="curr-path" id="curriculum-path">
    <!-- Populated by curriculum.js -->
  </main>

  <!-- ======== LESSON MODAL ======== -->
  <div class="lesson-overlay" id="lesson-overlay" aria-modal="true" role="dialog" aria-label="Lesson" hidden>
    <div class="lesson-modal" id="lesson-modal">
      <!-- Header -->
      <div class="lesson-header" id="lesson-header">
        <div class="lesson-header-left">
          <button class="lesson-close-btn" id="lesson-close-btn" aria-label="Close lesson">✕</button>
          <div class="lesson-breadcrumb" id="lesson-breadcrumb"></div>
        </div>
        <div class="lesson-progress-dots" id="lesson-progress-dots"></div>
        <div class="lesson-header-right">
          <span class="lesson-xp-badge" id="lesson-xp-badge">+10 XP</span>
        </div>
      </div>
      <!-- Content -->
      <div class="lesson-content" id="lesson-content"></div>
      <!-- Footer -->
      <div class="lesson-footer" id="lesson-footer">
        <button class="lesson-back-btn" id="lesson-back-btn">← Back</button>
        <button class="lesson-continue-btn" id="lesson-continue-btn">Continue →</button>
      </div>
    </div>
  </div>

  <!-- ======== MODULE OVERVIEW MODAL ======== -->
  <div class="module-overlay" id="module-overlay" hidden>
    <div class="module-modal" id="module-modal">
      <button class="lesson-close-btn module-close-btn" id="module-close-btn">✕</button>
      <div id="module-modal-content"></div>
    </div>
  </div>

  <!-- ======== XP TOAST ======== -->
  <div class="xp-toast" id="xp-toast" aria-live="polite"></div>

  <div id="footer-placeholder"></div>
  <script src="components.js"></script>
  <script>loadComponents('curriculum');</script>
  <script src="script.js"></script>
  <script src="curriculum.js"></script>
</body>
</html>
